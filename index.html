<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | Streetwear</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;700&display=swap');

        :root {
            --bg-color: #050505;
            --text-color: #f0f0f0;
            --accent-orange: #ff4500;
            --accent-blue: #00ffff;
            --grid-line: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Glitch Effect Typography */
        h1, h2, h3 {
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
            margin: 0;
        }

        .glitch-text {
            position: relative;
            color: white;
            font-size: 8rem;
            letter-spacing: 5px;
            z-index: 10;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -2px 0 var(--accent-orange);
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim 3s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: -2px 0 var(--accent-blue);
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(42px, 9999px, 44px, 0); }
            5% { clip: rect(12px, 9999px, 59px, 0); }
            10% { clip: rect(48px, 9999px, 29px, 0); }
            15% { clip: rect(42px, 9999px, 73px, 0); }
            20% { clip: rect(63px, 9999px, 27px, 0); }
            25% { clip: rect(34px, 9999px, 55px, 0); }
            30% { clip: rect(86px, 9999px, 73px, 0); }
            35% { clip: rect(20px, 9999px, 20px, 0); }
            40% { clip: rect(26px, 9999px, 60px, 0); }
            45% { clip: rect(25px, 9999px, 66px, 0); }
            50% { clip: rect(57px, 9999px, 98px, 0); }
            55% { clip: rect(5px, 9999px, 46px, 0); }
            60% { clip: rect(82px, 9999px, 31px, 0); }
            65% { clip: rect(54px, 9999px, 27px, 0); }
            70% { clip: rect(28px, 9999px, 99px, 0); }
            75% { clip: rect(45px, 9999px, 69px, 0); }
            80% { clip: rect(23px, 9999px, 85px, 0); }
            85% { clip: rect(54px, 9999px, 84px, 0); }
            90% { clip: rect(45px, 9999px, 47px, 0); }
            95% { clip: rect(37px, 9999px, 20px, 0); }
            100% { clip: rect(4px, 9999px, 91px, 0); }
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 4rem;
            position: fixed;
            width: 100%;
            box-sizing: border-box;
            z-index: 100;
            mix-blend-mode: difference;
        }

        .logo {
            font-family: 'Anton', sans-serif;
            font-size: 2rem;
            color: var(--accent-orange);
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-blue);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            position: relative;
            padding: 0 4rem;
        }

        .hero-content {
            z-index: 10;
            position: relative;
        }

        .hero-content p {
            font-size: 1.5rem;
            max-width: 400px;
            margin-top: -20px;
            color: #aaa;
            border-left: 4px solid var(--accent-orange);
            padding-left: 20px;
        }

        .hero-image-container {
            position: relative;
            height: 80vh;
            width: 100%;
            overflow: hidden;
            transform: rotate(2deg);
            border: 2px solid #333;
            box-shadow: 20px 20px 0 var(--accent-blue);
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(80%) contrast(120%);
            transition: filter 0.5s ease;
        }

        .hero-image:hover {
            filter: grayscale(0%) contrast(100%);
        }

        .limited-badge {
            position: absolute;
            top: 20px;
            right: -30px;
            background: var(--accent-orange);
            color: black;
            font-family: 'Anton', sans-serif;
            padding: 10px 40px;
            transform: rotate(45deg);
            font-size: 1.5rem;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.5);
        }

        /* CTA Button */
        .cta-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 3rem;
            background: transparent;
            color: white;
            font-family: 'Anton', sans-serif;
            font-size: 1.5rem;
            text-decoration: none;
            border: 2px solid var(--accent-blue);
            position: relative;
            overflow: hidden;
            transition: color 0.3s;
        }

        .cta-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent-blue);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .cta-btn:hover::before {
            left: 0;
        }

        .cta-btn:hover {
            color: black;
        }

        /* Lookbook Section */
        .lookbook {
            padding: 10rem 4rem;
            position: relative;
        }

        .section-title {
            font-size: 4rem;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.2);
            position: absolute;
            top: 50px;
            left: 4rem;
            transform: rotate(-90deg);
            transform-origin: left top;
            letter-spacing: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-auto-rows: 250px;
            gap: 20px;
            margin-left: 100px;
        }

        .grid-item {
            position: relative;
            overflow: hidden;
            border: 1px solid #222;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: all 0.5s ease;
        }

        .grid-item:hover img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        .item-1 { grid-column: 1 / 6; grid-row: 1 / 3; }
        .item-2 { grid-column: 6 / 9; grid-row: 1 / 2; }
        .item-3 { grid-column: 9 / 13; grid-row: 1 / 4; }
        .item-4 { grid-column: 6 / 9; grid-row: 2 / 4; }
        .item-5 { grid-column: 1 / 6; grid-row: 3 / 4; }

        .price-tag {
            position: absolute;
            bottom: 20px;
            left: -10px;
            background: black;
            color: var(--accent-orange);
            font-family: 'Anton', sans-serif;
            padding: 5px 20px;
            font-size: 1.2rem;
            border: 1px solid var(--accent-orange);
            transform: skew(-15deg);
        }

        /* Noise Overlay */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
            opacity: 0.05;
            background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        /* Industrial elements */
        .metal-bar {
            width: 100%;
            height: 40px;
            background: repeating-linear-gradient(
                45deg,
                #111,
                #111 10px,
                #222 10px,
                #222 20px
            );
            border-top: 2px solid var(--accent-orange);
            border-bottom: 2px solid var(--accent-blue);
            margin: 5rem 0;
        }

        @media (max-width: 1024px) {
            .hero {
                grid-template-columns: 1fr;
                text-align: center;
                padding-top: 100px;
            }

            .hero-content p {
                margin: 20px auto;
                border-left: none;
                border-top: 4px solid var(--accent-orange);
                padding-top: 20px;
                padding-left: 0;
            }

            .hero-image-container {
                height: 50vh;
                margin-top: 2rem;
            }

            .glitch-text {
                font-size: 5rem;
            }

            .grid-container {
                display: flex;
                flex-direction: column;
                margin-left: 0;
            }

            .section-title {
                position: relative;
                transform: none;
                top: 0;
                left: 0;
                margin-bottom: 2rem;
            }

            .lookbook {
                padding: 4rem 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="noise"></div>

    <nav>
        <div class="logo">NEXUS.</div>
        <div class="nav-links">
            <a href="#">Drop 01</a>
            <a href="#">Archive</a>
            <a href="#">Cart (0)</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1 class="glitch-text" data-text="SYSTEM">SYSTEM</h1>
            <h1 class="glitch-text" data-text="OVERRIDE">OVERRIDE</h1>
            <p>Embrace the chaos. The new collection merges dystopian utility with modern street aesthetics.</p>
            <a href="#" class="cta-btn">SHOP THE DROP</a>
        </div>
        <div class="hero-image-container">
            <!-- Using a realistic urban streetwear placeholder image -->
            <img src="https://images.unsplash.com/photo-1552374196-1ab2a1c593e8?q=80&w=1200&auto=format&fit=crop" alt="Streetwear Model" class="hero-image">
            <div class="limited-badge">LIMITED</div>
        </div>
    </section>

    <div class="metal-bar"></div>

    <section class="lookbook">
        <h2 class="section-title">LOOKBOOK</h2>
        <div class="grid-container">
            <div class="grid-item item-1">
                <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?q=80&w=800&auto=format&fit=crop" alt="Look 1">
                <div class="price-tag">$120</div>
            </div>
            <div class="grid-item item-2">
                <img src="https://images.unsplash.com/photo-1509319117193-57bab727e09d?q=80&w=600&auto=format&fit=crop" alt="Look 2">
                <div class="price-tag">$85</div>
            </div>
            <div class="grid-item item-3">
                <img src="https://images.unsplash.com/photo-1512353087810-254cb3656f1f?q=80&w=800&auto=format&fit=crop" alt="Look 3">
                <div class="price-tag">$150</div>
            </div>
            <div class="grid-item item-4">
                <img src="https://images.unsplash.com/photo-1543163521-1bf539c55dd2?q=80&w=600&auto=format&fit=crop" alt="Look 4">
                <div class="price-tag">$95</div>
            </div>
            <div class="grid-item item-5">
                <img src="https://images.unsplash.com/photo-1578681994506-b8f463449011?q=80&w=800&auto=format&fit=crop" alt="Look 5">
                <div class="price-tag">$200</div>
            </div>
        </div>
    </section>

</body>
</html>
